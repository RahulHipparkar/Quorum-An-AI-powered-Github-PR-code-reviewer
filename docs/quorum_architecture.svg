  <rect x="0" y="0" width="1640" height="1780" fill="#f7f8fb"/>

  <!-- ============ TITLE ============ -->
  <text x="40" y="46" font-size="26" font-weight="700" fill="#1a1a2e">Quorum — AI Code Reviewer</text>
  <text x="40" y="72" font-size="14" fill="#6b7280">Multi-agent GitHub PR review platform · LangGraph · FastAPI · AWS EKS</text>


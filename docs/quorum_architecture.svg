  <text x="790" y="320" font-size="13" font-weight="600" text-anchor="middle" fill="#333">Gateway Service</text>
  <text x="790" y="337" font-size="11" text-anchor="middle" fill="#6b7280">FastAPI · HMAC verify</text>

  <line x1="1330" y1="242" x2="1290" y2="296" stroke="#5b6b8c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1180" y1="322" x2="1144" y2="322" stroke="#5b6b8c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="940" y1="322" x2="904" y2="322" stroke="#5b6b8c" stroke-width="1.6" marker-end="url(#arrow)"/>


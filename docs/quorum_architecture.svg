  <text x="1250" y="1511" font-size="11" text-anchor="middle" fill="#6b7280">→ Learner Service</text>
  <text x="1250" y="1573" font-size="12" text-anchor="middle" fill="#155">Extract frequent issues</text>
  <text x="1250" y="1590" font-size="11" text-anchor="middle" fill="#6b7280">→ store repo patterns</text>


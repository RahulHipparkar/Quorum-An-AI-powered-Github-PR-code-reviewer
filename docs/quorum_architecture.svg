    <rect x="1090" y="52" width="14" height="14" rx="3" fill="#e3f5ec" stroke="#1a9e6a"/><text x="1110" y="63">AI / LangGraph</text>
    <rect x="1240" y="30" width="14" height="14" rx="3" fill="#fdeede" stroke="#d98324"/><text x="1260" y="41">AWS Infra</text>
    <rect x="1240" y="52" width="14" height="14" rx="3" fill="#e6f0f3" stroke="#3b8a9e"/><text x="1260" y="63">Data / Store</text>
    <rect x="1370" y="30" width="14" height="14" rx="3" fill="#ececf3" stroke="#6b7280"/><text x="1390" y="41">Observability</text>
    <rect x="1370" y="52" width="14" height="14" rx="3" fill="#e5e7eb" stroke="#374151"/><text x="1390" y="63">GitHub</text>
  </g>


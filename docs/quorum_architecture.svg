  <text x="145" y="161" font-size="13" text-anchor="middle" fill="#333">GitHub Actions</text>
  <text x="345" y="161" font-size="13" text-anchor="middle" fill="#333">Docker Build</text>
  <text x="545" y="161" font-size="13" text-anchor="middle" fill="#333">AWS ECR</text>
  <text x="845" y="161" font-size="13" font-weight="600" text-anchor="middle" fill="#333">EKS Kubernetes Cluster (hosts all services)</text>

  <line x1="220" y1="156" x2="264" y2="156" stroke="#5b6b8c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="420" y1="156" x2="464" y2="156" stroke="#5b6b8c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="620" y1="156" x2="694" y2="156" stroke="#5b6b8c" stroke-width="1.6" marker-end="url(#arrow)"/>

